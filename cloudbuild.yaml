steps:
  # 1. Build the Docker container image securely using Secret Manager
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
        --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
        --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
        --build-arg NEXT_PUBLIC_API_URL="$$NEXT_PUBLIC_API_URL" \
        --build-arg NEXT_PUBLIC_TENET_API_KEY="$$NEXT_PUBLIC_TENET_API_KEY" \
        -t us-central1-docker.pkg.dev/ai-calling-agent-piyushchokker/callagent-repo/callagent-frontend:$COMMIT_SHA .
    secretEnv: ['NEXT_PUBLIC_SUPABASE_URL', 'NEXT_PUBLIC_SUPABASE_ANON_KEY', 'NEXT_PUBLIC_API_URL', 'NEXT_PUBLIC_TENET_API_KEY']
    
  # 2. Push the container image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'us-central1-docker.pkg.dev/ai-calling-agent-piyushchokker/callagent-repo/callagent-frontend:$COMMIT_SHA'
    
  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'callagent-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/ai-calling-agent-piyushchokker/callagent-repo/callagent-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

# Tell Cloud Build to pull these secrets directly from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/ai-calling-agent-piyushchokker/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: projects/ai-calling-agent-piyushchokker/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
    - versionName: projects/ai-calling-agent-piyushchokker/secrets/NEXT_PUBLIC_API_URL/versions/latest
      env: 'NEXT_PUBLIC_API_URL'
    - versionName: projects/ai-calling-agent-piyushchokker/secrets/NEXT_PUBLIC_TENET_API_KEY/versions/latest
      env: 'NEXT_PUBLIC_TENET_API_KEY'

# Specify the images to be pushed
images:
  - 'us-central1-docker.pkg.dev/ai-calling-agent-piyushchokker/callagent-repo/callagent-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
